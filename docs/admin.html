<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel — Gajanan Trading Co.</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --primary:#1b5e20;
  --bg:#f4f6f4;
  --card:#ffffff;
  --border:#e0e0e0;
  --radius:10px;
  --shadow:0 2px 10px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:#212121}

header{
  background:var(--primary);
  color:#fff;
  padding:14px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.wrap{max-width:1200px;margin:24px auto;padding:0 16px}
.section{margin-bottom:26px}
.section h2{font-size:18px;color:var(--primary);margin-bottom:12px}

.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow)
}

table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden}
thead{background:var(--primary);color:#fff}
th,td{padding:12px 14px;font-size:14px;border-bottom:1px solid #f0f0f0}

.badge{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700}
.pending{background:#fff3e0;color:#e65100}
.confirmed{background:#e8f5e9;color:#2e7d32}
.delivered{background:#e3f2fd;color:#1565c0}
.cancelled{background:#fce4ec;color:#c62828}

.empty{padding:40px;text-align:center;color:#9e9e9e}

/* LOGIN GATE */
#gate{
  position:fixed;inset:0;z-index:9999;
  background:#1b5e20;
  display:flex;align-items:center;justify-content:center
}
#gate-box{
  background:#fff;padding:36px;border-radius:16px;width:340px;text-align:center
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="gate">
  <div id="gate-box">
    <h2 style="color:#1b5e20">🔐 Admin Login</h2>
    <input id="adminPass" type="password" placeholder="Admin Password"
      style="width:100%;padding:12px;margin-top:16px;text-align:center"
      onkeydown="if(event.key==='Enter') loginAdmin()">
    <p id="loginError" style="display:none;color:#c62828;font-size:13px;margin-top:8px">
      Wrong password
    </p>
    <button onclick="loginAdmin()" style="margin-top:14px;width:100%;padding:12px;
      background:#1b5e20;color:#fff;border:none;border-radius:8px;font-weight:700">
      Enter Admin
    </button>
  </div>
</div>

<header>
  <h1>👨‍💼 Admin Panel</h1>
  <a href="index.html" style="color:#fff">← Shop</a>
</header>

<div class="wrap">

  <div class="section">
    <h2>📋 Orders</h2>
    <div id="ordersWrap" class="card empty">Loading orders…</div>
  </div>

</div>

<script>
/* ================= CONFIG ================= */
const ADMIN_PASSWORD = "gajanan123";
const DB = "https://my-shop-orders-a863e-default-rtdb.firebaseio.com";

/* ================= LOGIN ================= */
if(sessionStorage.getItem("admin_auth")==="yes"){
  document.getElementById("gate").style.display="none";
}

function loginAdmin(){
  const pass = document.getElementById("adminPass");
  const err  = document.getElementById("loginError");

  if(pass.value === ADMIN_PASSWORD){
    sessionStorage.setItem("admin_auth","yes");
    document.getElementById("gate").style.display="none";
  }else{
    err.style.display="block";
  }
}

/* ================= LOAD ORDERS ================= */
fetch(DB + "/orders.json")
.then(r => r.json())
.then(data => {
  if(!data){
    document.getElementById("ordersWrap").innerHTML =
      '<div class="empty">No orders yet</div>';
    return;
  }

  const orders = Object.entries(data).map(([id,o])=>({id,...o}));

  let html = `
  <table>
    <thead>
      <tr>
        <th>Order</th>
        <th>Customer</th>
        <th>Status</th>
        <th>Total</th>
      </tr>
    </thead><tbody>`;

  orders.forEach(o=>{
    html += `
    <tr>
      <td>${o.order_number || o.id}</td>
      <td>${o.customer?.name || ""}<br>${o.customer?.phone || ""}</td>
      <td><span class="badge ${o.status||'pending'}">${o.status||'pending'}</span></td>
      <td>₹${(o.total||0).toFixed(2)}</td>
    </tr>`;
  });

  document.getElementById("ordersWrap").innerHTML = html + "</tbody></table>";
});
</script>

</body>
</html>
