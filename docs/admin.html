<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin — Gajanan Trading Co.</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --primary:#1b5e20;
  --bg:#f4f6f4;
  --card:#ffffff;
  --border:#e0e0e0;
  --success:#2e7d32;
  --warn:#e65100;
  --danger:#c62828;
  --radius:10px;
  --shadow:0 2px 10px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:#212121}

header{
  background:var(--primary);
  color:#fff;
  padding:14px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header h1{font-size:18px}
header a{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.4);padding:6px 14px;border-radius:20px}

.wrap{max-width:1300px;margin:24px auto;padding:0 16px}

.section{margin-bottom:28px}
.section h2{font-size:18px;color:var(--primary);margin-bottom:12px}

.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow)
}

table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
thead{background:var(--primary);color:#fff}
th,td{padding:12px 14px;font-size:14px;border-bottom:1px solid #f0f0f0;vertical-align:top}
th{font-weight:600}
tr:hover{background:#f9fbe7}

.badge{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700}
.pending{background:#fff3e0;color:#e65100}
.confirmed{background:#e8f5e9;color:#2e7d32}
.delivered{background:#e3f2fd;color:#1565c0}
.cancelled{background:#fce4ec;color:#c62828}

select{
  padding:4px 8px;
  border:1px solid var(--border);
  border-radius:6px;
  font-size:13px
}

.items{
  font-size:12px;
  color:#555;
  line-height:1.7;
  margin-top:6px;
  display:none;
}

.toggle-btn{
  background:#e8f5e9;
  color:#1b5e20;
  border:none;
  padding:4px 10px;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
}

.empty{
  padding:40px;
  text-align:center;
  color:#9e9e9e;
}

/* LOGIN GATE */
#gate{
  position:fixed;inset:0;z-index:9999;
  background:#1b5e20;
  display:flex;align-items:center;justify-content:center
}
#gate-box{
  background:#fff;padding:36px;border-radius:16px;width:340px;text-align:center
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="gate">
  <div id="gate-box">
    <h2 style="color:#1b5e20">🔐 Admin Login</h2>
    <input id="adminPass" type="password" placeholder="Admin Password"
      style="width:100%;padding:12px;margin-top:16px;text-align:center"
      onkeydown="if(event.key==='Enter') loginAdmin()">
    <p id="loginError" style="display:none;color:#c62828;font-size:13px;margin-top:8px">
      Wrong password
    </p>
    <button onclick="loginAdmin()" style="margin-top:14px;width:100%;padding:12px;
      background:#1b5e20;color:#fff;border:none;border-radius:8px;font-weight:700">
      Enter Admin
    </button>
  </div>
</div>

<header>
  <h1>👨‍💼 Admin — Orders</h1>
  <a href="index.html">← Shop</a>
</header>

<div class="wrap">
  <div class="section">
    <h2>📋 All Orders</h2>
    <div id="ordersWrap" class="card empty">Loading orders…</div>
  </div>
</div>

<script>
/* CONFIG */
const ADMIN_PASSWORD = "gajanan123";
const DB = "https://my-shop-orders-a863e-default-rtdb.firebaseio.com";

/* LOGIN */
if(sessionStorage.getItem("admin_auth")==="yes"){
  document.getElementById("gate").style.display="none";
}
function loginAdmin(){
  const pass = document.getElementById("adminPass");
  const err  = document.getElementById("loginError");
  if(pass.value === ADMIN_PASSWORD){
    sessionStorage.setItem("admin_auth","yes");
    document.getElementById("gate").style.display="none";
  }else{
    err.style.display="block";
  }
}

/* LOAD ORDERS */
fetch(DB + "/orders.json")
.then(r => r.json())
.then(data => {
  if(!data){
    document.getElementById("ordersWrap").innerHTML =
      '<div class="empty">No orders yet</div>';
    return;
  }

  const orders = Object.entries(data)
    .map(([id,o])=>({id,...o}))
    .sort((a,b)=>(b.created_at||0)-(a.created_at||0));

  let html = `
  <table>
    <thead>
      <tr>
        <th>Order</th>
        <th>Customer</th>
        <th>Status</th>
        <th>Total</th>
        <th>Details</th>
      </tr>
    </thead><tbody>`;

  orders.forEach(o=>{
    const total = (o.cart||[]).reduce((s,i)=>s+(i.item_total||0),0);
    html += `
    <tr>
      <td>${o.order_number || o.id}</td>
      <td>
        <strong>${o.customer?.name || "-"}</strong><br>
        📞 ${o.customer?.phone || ""}<br>
        ${o.customer?.address ? "📍 "+o.customer.address : ""}
        ${o.customer?.pickup_slot ? "<br>🕒 "+o.customer.pickup_slot : ""}
      </td>
      <td>
        <span class="badge ${o.status||"pending"}">${o.status||"pending"}</span><br><br>
        <select onchange="updateStatus('${o.id}',this.value)">
          ${["pending","confirmed","delivered","cancelled"]
            .map(s=>`<option value="${s}" ${o.status===s?"selected":""}>${s}</option>`).join("")}
        </select>
      </td>
      <td><strong>₹${total.toFixed(2)}</strong></td>
      <td>
        <button class="toggle-btn" onclick="toggleItems('${o.id}')">Items ▾</button>
        <div id="items-${o.id}" class="items">
          ${(o.cart||[]).map(i =>
            `• ${i.name_marathi||i.name} — ${i.quantity} ${i.unit} = ₹${(i.item_total||0).toFixed(2)}`
          ).join("<br>")}
          ${o.customer?.notes ? `<br><em>Note: ${o.customer.notes}</em>` : ""}
        </div>
      </td>
    </tr>`;
  });

  document.getElementById("ordersWrap").innerHTML = html + "</tbody></table>";
});

/* UPDATE STATUS */
function updateStatus(id, status){
  fetch(`${DB}/orders/${id}/status.json`,{
    method:"PUT",
    body:JSON.stringify(status)
  });
}

/* TOGGLE ITEMS */
function toggleItems(id){
  const el = document.getElementById("items-"+id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
